services:
  db:
    image: postgres:16-alpine
    container_name: mixarr_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mixarr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mixarrpass}
      POSTGRES_DB: ${POSTGRES_DB:-mixarrdb}
    volumes:
      - mixarr_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mixarr} -d ${POSTGRES_DB:-mixarrdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: mixarr_app
    restart: always
    ports:
      - "3030:3000"
      # Uncomment to expose the Prometheus metrics endpoint to the host.
      # The container-side port must match METRICS_PORT below.
      # - "9090:9090"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mixarr}:${POSTGRES_PASSWORD:-mixarrpass}@db:5432/${POSTGRES_DB:-mixarrdb}?schema=public
      - PLEX_CLIENT_IDENTIFIER=${PLEX_CLIENT_IDENTIFIER}
      - PLEX_PRODUCT_NAME=${PLEX_PRODUCT_NAME:-Plex Playlist Builder}
      - DEFAULT_POPULARITY_PROVIDER=${DEFAULT_POPULARITY_PROVIDER:-deezer}
      - LASTFM_API_KEY=${LASTFM_API_KEY}
      - LASTFM_AUTOCORRECT=${LASTFM_AUTOCORRECT:-0}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - POPULARITY_REFRESH_DAYS=${POPULARITY_REFRESH_DAYS:-30}
      - MAX_PLAYLIST_SIZE=${MAX_PLAYLIST_SIZE:-5000}
      - LOCAL_BPM_SAMPLE_SECONDS=${LOCAL_BPM_SAMPLE_SECONDS:-60}
      - LOCAL_BPM_RETRY_DAYS=${LOCAL_BPM_RETRY_DAYS:-14}
      - LOCAL_BPM_CONFIDENCE_THRESHOLD=${LOCAL_BPM_CONFIDENCE_THRESHOLD:-0.75}
      - LOCAL_BPM_FFMPEG_PATH=${LOCAL_BPM_FFMPEG_PATH:-ffmpeg}
      - LOCAL_BPM_AUBIO_PATH=${LOCAL_BPM_AUBIO_PATH:-aubio}
      - SYNC_CRON_SCHEDULE=${SYNC_CRON_SCHEDULE:-0 3 * * *}
      - SYNC_MAX_PIPELINE_MS=${SYNC_MAX_PIPELINE_MS:-21600000}
      - METRICS_PORT=${METRICS_PORT:-0}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - mixarr_app_logs:/app/logs

   #grafana:                       # Uncomment to add Grafana for monitoring. If you want Mixarr metrics, be sure to set METRICS_PORT above and in .env
