name: Publish Multi-Arch Docker Image

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from the Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cvarano84/mixarr

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read package version
        id: package
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.package.outputs.version }}
          labels: |
            org.opencontainers.image.title=Mixarr
            org.opencontainers.image.description=Smart Playlist Engine for Plex Media Server - Dynamic, vibe-based mixes for your self-hosted music library
            org.opencontainers.image.vendor=cvarano84
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ steps.package.outputs.version }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}#readme
            org.opencontainers.image.authors=cvarano84

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.package.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
